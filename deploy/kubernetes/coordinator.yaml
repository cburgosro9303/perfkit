# perfkit coordinator — plano de control (Deployment 1 réplica + Service ClusterIP :7700).
#
# Expone la API HTTP/JSON de control en :7700. Descubre a los workers vía el
# Service headless "perfkit-worker" (DNS) y agrega métricas en un reporte consolidado.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: perfkit-coordinator
  namespace: perfkit
  labels:
    app.kubernetes.io/name: perfkit
    app.kubernetes.io/component: coordinator
    app.kubernetes.io/part-of: perfkit
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: perfkit
      app.kubernetes.io/component: coordinator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: perfkit
        app.kubernetes.io/component: coordinator
        app.kubernetes.io/part-of: perfkit
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: coordinator
          image: perfkit/coordinator:0.1
          imagePullPolicy: IfNotPresent
          args:
            - "coordinator"
            - "serve"
            - "--listen=0.0.0.0:7700"
            - "--worker-discovery=dns"
            - "--worker-service=perfkit-worker.perfkit.svc.cluster.local"
            - "--worker-port=7711"
          env:
            - name: PERFKIT_SCENARIO
              value: /etc/perfkit/scenario.yaml
            - name: PERFKIT_THRESHOLDS
              value: /etc/perfkit/thresholds.yaml
            # Carga total a repartir entre los workers (no por worker).
            - name: PERFKIT_VUS
              value: "300"
            - name: PERFKIT_DURATION_SECS
              value: "60"
            # Barrier start: no arranca hasta que todos los workers estén READY.
            - name: PERFKIT_EXPECTED_WORKERS
              value: "3"
            - name: PERFKIT_BARRIER_START
              value: "true"
            - name: RUST_LOG
              value: "info"
          ports:
            - name: http
              containerPort: 7700
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          volumeMounts:
            - name: scenario
              mountPath: /etc/perfkit
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: scenario
          configMap:
            name: perfkit-scenario
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: perfkit-coordinator
  namespace: perfkit
  labels:
    app.kubernetes.io/name: perfkit
    app.kubernetes.io/component: coordinator
    app.kubernetes.io/part-of: perfkit
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: perfkit
    app.kubernetes.io/component: coordinator
  ports:
    - name: http
      port: 7700
      targetPort: http
      protocol: TCP
