{{- /* Coordinator (plano de control) + ConfigMap del plan + target opcional. */ -}}
{{- if .Values.scenario.create }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "perfkit.scenario.configMapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "perfkit.labels" . | nindent 4 }}
data:
  scenario.yaml: |
{{ .Values.scenario.inline | indent 4 }}
  thresholds.yaml: |
    max_error_rate: {{ .Values.scenario.thresholds.maxErrorRate }}
    max_p95_ms: {{ .Values.scenario.thresholds.maxP95Ms }}
    max_p99_ms: {{ .Values.scenario.thresholds.maxP99Ms }}
    min_throughput_per_sec: {{ .Values.scenario.thresholds.minThroughputPerSec }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "perfkit.coordinator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "perfkit.labels" . | nindent 4 }}
    app.kubernetes.io/component: coordinator
spec:
  replicas: {{ .Values.coordinator.replicas }}
  selector:
    matchLabels:
      {{- include "perfkit.selectorLabels" (dict "ctx" . "component" "coordinator") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "perfkit.labels" . | nindent 8 }}
        app.kubernetes.io/component: coordinator
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: coordinator
          image: "{{ .Values.coordinator.image.repository }}:{{ .Values.coordinator.image.tag }}"
          imagePullPolicy: {{ .Values.coordinator.image.pullPolicy }}
          args:
            - "coordinator"
            - "serve"
            - "--listen=0.0.0.0:{{ .Values.coordinator.service.port }}"
            - "--worker-discovery=dns"
            - "--worker-service={{ include "perfkit.worker.serviceFqdn" . }}"
            - "--worker-port={{ .Values.worker.service.port }}"
            {{- with .Values.coordinator.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: PERFKIT_SCENARIO
              value: /etc/perfkit/scenario.yaml
            - name: PERFKIT_THRESHOLDS
              value: /etc/perfkit/thresholds.yaml
            - name: PERFKIT_VUS
              value: {{ .Values.coordinator.vus | quote }}
            - name: PERFKIT_DURATION_SECS
              value: {{ .Values.coordinator.durationSecs | quote }}
            - name: PERFKIT_EXPECTED_WORKERS
              value: {{ .Values.worker.replicas | quote }}
            - name: PERFKIT_BARRIER_START
              value: {{ .Values.coordinator.barrierStart | quote }}
            - name: RUST_LOG
              value: "info"
            {{- with .Values.coordinator.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.coordinator.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.coordinator.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if .Values.scenario.create }}
          volumeMounts:
            - name: scenario
              mountPath: /etc/perfkit
              readOnly: true
          {{- end }}
      {{- with .Values.coordinator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.coordinator.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.coordinator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.scenario.create }}
      volumes:
        - name: scenario
          configMap:
            name: {{ include "perfkit.scenario.configMapName" . }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "perfkit.coordinator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "perfkit.labels" . | nindent 4 }}
    app.kubernetes.io/component: coordinator
spec:
  type: {{ .Values.coordinator.service.type }}
  selector:
    {{- include "perfkit.selectorLabels" (dict "ctx" . "component" "coordinator") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.coordinator.service.port }}
      targetPort: http
      protocol: TCP
{{- if .Values.target.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "perfkit.target.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "perfkit.labels" . | nindent 4 }}
    app.kubernetes.io/component: target
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "perfkit.selectorLabels" (dict "ctx" . "component" "target") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "perfkit.labels" . | nindent 8 }}
        app.kubernetes.io/component: target
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: target
          image: "{{ .Values.target.image.repository }}:{{ .Values.target.image.tag }}"
          imagePullPolicy: {{ .Values.target.image.pullPolicy }}
          command: ["python", "-m", "http.server", "{{ .Values.target.port }}"]
          ports:
            - name: http
              containerPort: {{ .Values.target.port }}
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.target.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "perfkit.target.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "perfkit.labels" . | nindent 4 }}
    app.kubernetes.io/component: target
spec:
  type: ClusterIP
  selector:
    {{- include "perfkit.selectorLabels" (dict "ctx" . "component" "target") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.target.port }}
      targetPort: http
      protocol: TCP
{{- end }}
